<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube URL 変換ツール</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #CC0000;
            color: white;
            padding: 15px;
            font-size: 20px;
            border-radius: 10px 10px 0 0;
        }

        h2 {
            margin: 0;
        }

        textarea {
            width: calc(100% - 22px);
            padding: 10px;
            margin: 10px 11px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }

        .time-input {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .time-input div {
            flex: 1;
            min-width: 120px;
            margin: 5px;
        }

        .time-input input {
            width: calc(100% - 22px);
            padding: 10px;
            margin: 10px 11px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #007BFF;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            margin-top: 15px;
            font-size: 14px;
            word-break: break-all;
            text-align: left;
        }

        #output a {
            color: #007BFF;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }

        #output a:hover {
            text-decoration: underline;
        }

        /* スマホ対応（画面幅 400px 以下で時間入力を縦並びに） */
        @media (max-width: 400px) {
            .time-input {
                flex-direction: column;
            }

            .time-input div {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>YouTube 時間指定URL変換ツール</h2>
        <label for="youtubeUrl">YouTubeのURL（複数行可）:</label>
        <textarea id="youtubeUrl" rows="5" placeholder="https://www.youtube.com/watch?v=XXXXX"></textarea>
        <br>
        <div class="time-input">
            <div>
                <label for="hours">開始時間（時）:</label>
                <input type="number" id="hours" min="0" value="">
            </div>
            <div>
                <label for="minutes">分:</label>
                <input type="number" id="minutes" min="0" value="">
            </div>
            <div>
                <label for="seconds">秒:</label>
                <input type="number" id="seconds" min="0" max="59" value="">
            </div>
        </div>
        <br>
        <button onclick="convertUrl()">変換してコピー</button>
        <div id="output"></div>
    </div>

    <script>
        function convertUrl() {
            let inputText = document.getElementById("youtubeUrl").value;
            let lines = inputText.split(/\r?\n/).filter(line => line.trim() !== "");
            
            let hVal = document.getElementById("hours").value;
            let mVal = document.getElementById("minutes").value;
            let sVal = document.getElementById("seconds").value;

            let hours = parseInt(hVal, 10) || 0;
            let minutes = parseInt(mVal, 10) || 0;
            let seconds = parseInt(sVal, 10) || 0;

            let hasTimeInput = (hVal !== "" || mVal !== "" || sVal !== "");
            let startTime = "";

            if (hasTimeInput) {
                if (hours !== 0) startTime += `${hours}h`;
                if (minutes !== 0) startTime += `${minutes}m`;
                if (seconds !== 0) startTime += `${seconds}s`;
            }

            let convertedUrls = [];
            let errorLines = [];

            lines.forEach(line => {
                let url = line.trim();
                let videoIdMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube.com\/live\/)([a-zA-Z0-9_-]+)/);
                if (videoIdMatch) {
                    let videoId = videoIdMatch[1];
                    let timeParam = (hasTimeInput && startTime !== "") ? `&t=${startTime}` : "";
                    let newUrl = `https://www.youtube.com/watch?v=${videoId}${timeParam}`;
                    convertedUrls.push(newUrl);
                } else {
                    errorLines.push(url);
                }
            });

            if (convertedUrls.length === 0) {
                alert("有効なYouTubeのURLを入力してください");
                return;
            }

            let clipboardText = convertedUrls.join("\n");
            let outputHtml = "<h3>コピーしました:</h3>";
            convertedUrls.forEach(u => {
                outputHtml += `<a href="${u}" target="_blank">${u}</a>`;
            });

            if (errorLines.length > 0) {
                outputHtml += "<p style='color: red; margin-top: 10px;'>※無視された行: " + errorLines.join(", ") + "</p>";
            }

            // クリップボードにコピー
            navigator.clipboard.writeText(clipboardText).then(() => {
                document.getElementById("output").innerHTML = outputHtml;
            }).catch(err => {
                alert("コピーに失敗しました: " + err);
            });
        }
    </script>
</body>

</html>
